---
- name: Configure nodes
  hosts: k8s
  become: true
  tasks:

    # -----------------------------------------------------------------------------
    # DISABLE SWAP
    #
    # Kubernetes schedules pods based on declared resource requests (CPU and
    # memory). If swap is enabled, the OS can silently move memory pages to disk,
    # making actual memory availability unpredictable. The kubelet cannot account
    # for swap when making scheduling decisions or enforcing memory limits — it
    # assumes that the memory it allocates maps directly to physical RAM. With swap
    # enabled, a node may accept a pod it cannot truly serve, leading to degraded
    # performance and unreliable OOMKill behavior.

    - name: Disable swap
      command: swapoff -a
      when: ansible_facts["swaptotal_mb"] > 0

    # Without this, swap entries in /etc/fstab would re-enable swap on reboot,
    # undoing the swapoff above.
    - name: Disable swap in fstab on reboot
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # -----------------------------------------------------------------------------
    # LOAD KERNEL MODULES
    #
    # Two kernel modules are required before Kubernetes networking and the
    # container runtime can function correctly.

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
      loop:
        - overlay
          # Container images are built in layers (base OS, then application layers
          # stacked on top). OverlayFS lets containerd mount those read-only image
          # layers and place a single writable layer on top, giving each container
          # its own isolated filesystem without duplicating image data on disk.
        - br_netfilter
          # Kubernetes connects pods via virtual Linux bridges. Without this module,
          # bridge traffic bypasses iptables entirely, so kube-proxy's service rules
          # and NetworkPolicy rules would never see pod-to-pod traffic on the same
          # node. br_netfilter routes bridge traffic through the standard netfilter
          # hooks so those rules apply correctly.

    # Files in /etc/modules-load.d/ are read at boot time by systemd-modules-load,
    # which loads the listed modules before any services start. Without this, the
    # modules loaded above would be lost after a reboot.
    - name: Load kernel modules on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    # -----------------------------------------------------------------------------
    # CONFIGURE NETWORK
    #
    # Three sysctl parameters are required for the Kubernetes network model to work:
    #
    #   net.bridge.bridge-nf-call-iptables / ip6tables
    #     Tells the kernel to pass bridge traffic through the iptables/ip6tables
    #     chains. This is what makes br_netfilter useful: kube-proxy writes service
    #     rules and NetworkPolicy controllers write policy rules into iptables, and
    #     these settings ensure those rules are evaluated for all pod traffic,
    #     including traffic between pods on the same node.
    #
    #   net.ipv4.ip_forward
    #     Allows the node to forward packets between network interfaces (e.g., from
    #     the pod network interface to the physical NIC). Without this, pods can
    #     talk to their own node but not to pods or services on other nodes.

    - name: Configure sysctl for Kubernetes networking
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
      register: sysctl_config

    - name: Apply sysctl settings
      command: sysctl --system
      when: sysctl_config.changed

    # -----------------------------------------------------------------------------
    # INSTALL BASE PACKAGES
    #
    # These packages are prerequisites for adding external APT repositories
    # (Docker and Kubernetes), which require HTTPS transport and GPG key handling.

    - name: Install APT dependencies
      apt:
        name:
          - ca-certificates
          - gpg
        update_cache: yes
        state: present

    # -----------------------------------------------------------------------------
    # INSTALL CONTAINER RUNTIME
    #
    # Kubernetes does not run containers itself. Instead, the kubelet delegates
    # all container lifecycle operations (pull image, create container, start/stop,
    # report status) to a Container Runtime Interface (CRI) plugin. containerd is
    # the industry-standard CRI implementation. It manages images and hands off
    # actual container creation to runc, the low-level OCI runtime that sets up
    # Linux namespaces and cgroups for each container process.
    #
    # The containerd.io package (distributed by Docker, not the containerd project)
    # bundles containerd and runc together.
    # See: https://docs.docker.com/engine/install/ubuntu/#install-using-the-repository

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_facts["lsb"]["codename"] }}
          Architectures: {{ {"x86_64": "amd64", "aarch64": "arm64"}[ansible_facts["architecture"]] }}
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Install containerd runtime
      apt:
        name: containerd.io
        update_cache: yes

    # containerd ships with a built-in config generator. We use its output as a
    # baseline so we inherit all defaults, then patch only what we need to change.
    - name: Read containerd default config
      command: containerd config default
      register: containerd_default
      changed_when: false

    # Both containerd and the kubelet manage cgroups — containerd to enforce per-
    # container resource limits, and kubelet to enforce per-pod limits. They must
    # use the same cgroup driver. On systemd-based systems (like Ubuntu 22.04),
    # systemd already owns the cgroup hierarchy, so both must be configured to
    # delegate to systemd rather than managing cgroups directly. Mixing drivers
    # causes duplicate cgroup hierarchies and unpredictable resource accounting.
    - name: Enable systemd cgroup driver
      copy:
        dest: /etc/containerd/config.toml
        content: >-
          {{
            containerd_default.stdout
            | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true')
          }}
        mode: "0644"
      register: containerd_config

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: true
      when: containerd_config.changed

    # -----------------------------------------------------------------------------
    # INSTALL KUBERNETES PACKAGES
    #
    # Three components are installed on every node:
    #
    #   kubelet   The node agent. Watches the API server for pods assigned to this
    #             node, instructs containerd to run the required containers, and
    #             reports node and pod status back to the control plane. It runs as
    #             a systemd service on every node (control plane and worker alike).
    #
    #   kubeadm   A bootstrap tool that automates cluster setup: it generates TLS
    #             certificates, writes static pod manifests for the control plane
    #             components (API server, etcd, controller manager, scheduler), and
    #             produces the join tokens that workers use to register themselves.
    #
    #   kubectl   The CLI for the Kubernetes API. Strictly optional on worker nodes
    #             but included everywhere for debugging convenience.
    #
    # See: https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/

    - name: Add Kubernetes APT signing key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key
        dest: /tmp/k8s.key

    # GPG keys distributed as ASCII-armored text must be converted to binary
    # format before APT can use them for signature verification.
    - name: Convert Kubernetes key to GPG binary format
      command: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/k8s.key
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes APT repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /

    # The repo URL already pins the minor version (v1.36), so apt only resolves
    # packages published for that release stream.
    - name: Install Kubernetes tools
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        update_cache: yes
        state: present

    # Prevent unattended-upgrades or manual apt upgrade from pulling in a newer
    # patch release. Kubernetes requires all nodes in a cluster to run the same
    # minor version; an accidental upgrade on one node can break the cluster.
    - name: Pin Kubernetes package versions
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    # Enable kubelet now so it is ready when kubeadm runs in create-cluster.yml.
    # Until kubeadm provides its configuration, kubelet will crash-loop — this is
    # expected and harmless. kubeadm will drop the configuration files and kubelet
    # will stabilize once the cluster is initialized.
    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true
        state: started
