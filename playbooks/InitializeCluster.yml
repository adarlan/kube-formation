---
- name: Bootstrap control plane
  hosts: bootstrap_control_plane
  become: true
  tasks:

    # -----------------------------------------------------------------------------
    # INITIALIZE THE CONTROL PLANE
    #
    # kubeadm init bootstraps the first control plane node. It:
    #   - Generates a cluster CA and all TLS certificates used by components to
    #     authenticate with each other
    #   - Writes static pod manifests to /etc/kubernetes/manifests/; kubelet watches
    #     that directory and automatically starts the pods it finds there
    #
    # The four control plane components started as static pods:
    #
    #   etcd                   Distributed key-value store that holds all cluster
    #                          state — every object (pods, services, configmaps...)
    #                          is persisted here and nowhere else.
    #
    #   kube-apiserver         The only component that reads and writes etcd. All
    #                          other components (and kubectl) communicate exclusively
    #                          through the API server.
    #
    #   kube-controller-manager Runs controllers that continuously reconcile desired
    #                          state against actual state: the Deployment controller,
    #                          ReplicaSet controller, node lifecycle controller, etc.
    #
    #   kube-scheduler         Watches for pods that have no node assigned and
    #                          selects a node for them based on resource requests,
    #                          taints/tolerations, and affinity rules.
    #
    # Flags used:
    #   --node-name            Sets the Kubernetes node name. Overrides the OS
    #                          hostname, which on EC2 is the AWS-generated name
    #                          (e.g. ip-172-31-1-2), not our logical name.
    #
    #   --pod-network-cidr     The IP range from which pod IPs are allocated. Must
    #                          match what the CNI plugin expects — Flannel defaults
    #                          to 10.244.0.0/16.
    #
    #   --apiserver-cert-extra-sans  Adds the public IP to the API server's TLS
    #                          certificate as a Subject Alternative Name, so kubectl
    #                          can connect from outside the VPC without a cert error.
    #
    #   --control-plane-endpoint  The stable address joining nodes and kubectl use
    #                          to reach the API server. In a production HA setup this
    #                          would be a load balancer; here we use the first control
    #                          plane's public IP.

    - name: Initialize control plane
      command: >
        kubeadm init
        --node-name {{ inventory_hostname }}
        --pod-network-cidr=10.244.0.0/16
        --apiserver-cert-extra-sans={{ ansible_host }}
        --control-plane-endpoint={{ ansible_host }}:6443
      args:
        creates: /etc/kubernetes/admin.conf

    # -----------------------------------------------------------------------------
    # CREATE BOOTSTRAP TOKEN
    #
    # Nodes join the cluster by authenticating with a bootstrap token — a short-
    # lived credential embedded in the join command. The join command contains three
    # pieces:
    #   - The API server endpoint (where to connect)
    #   - The bootstrap token (proves the joining node was invited)
    #   - A SHA256 hash of the cluster CA certificate (pins the CA during the
    #     initial TLS handshake so the joining node can verify it is talking to the
    #     right cluster and not an impostor)
    #
    # The token is stored as a host fact so the subsequent plays (additional control
    # planes and workers) can read it via hostvars.

    - name: Create bootstrap token
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Store join command
      set_fact:
        join_command: "{{ join_command.stdout }}"

    # -----------------------------------------------------------------------------
    # UPLOAD CONTROL PLANE CERTIFICATES
    #
    # In an HA setup, every control plane node must share the same cluster CA and
    # etcd peer certificates that were generated on the first node. Manually copying
    # these files to each node would be fragile. Instead, kubeadm encrypts the
    # certificates and stores them as a Secret named "kubeadm-certs" in the
    # kube-system namespace. Additional control planes download and decrypt them
    # automatically during kubeadm join using the printed certificate key.
    #
    # The key is stored as a host fact for the same reason as the join command.

    - name: Upload control plane certificates
      command: kubeadm init phase upload-certs --upload-certs
      register: upload_certs

    - name: Store certificate key
      set_fact:
        certificate_key: "{{ upload_certs.stdout_lines[-1] }}"

    # -----------------------------------------------------------------------------
    # INSTALL CNI PLUGIN
    #
    # The Container Network Interface (CNI) is what gives each pod its own IP
    # address and enables pod-to-pod communication across nodes. Without a CNI
    # plugin, the cluster starts but every pod stays Pending — the scheduler cannot
    # assign them because the node's networking is not ready.
    #
    # Flannel is a simple overlay network. It allocates a subnet from the pod CIDR
    # to each node and uses VXLAN to encapsulate traffic between nodes. On the
    # receiving node, the VXLAN tunnel is decapsulated and the packet is delivered
    # to the destination pod via the local bridge (flannel.1).
    #
    # The pod CIDR passed to kubeadm init (10.244.0.0/16) must match the range
    # configured in the Flannel manifest, which defaults to that same range.

    - name: Download Flannel manifest
      get_url:
        url: https://github.com/flannel-io/flannel/releases/download/v0.28.5/kube-flannel.yml
        dest: /tmp/kube-flannel.yml
        mode: "0644"

    - name: Apply Flannel manifest
      command: kubectl apply -f /tmp/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: flannel_apply
      changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

- name: Additional control planes
  hosts: control_plane:!bootstrap_control_plane
  become: true
  tasks:

    # -----------------------------------------------------------------------------
    # JOIN ADDITIONAL CONTROL PLANES
    #
    # kubeadm join --control-plane sets up a full control plane replica:
    #   1. Downloads and decrypts the shared CA and etcd certificates from the
    #      kubeadm-certs Secret using the certificate key
    #   2. Generates this node's API server certificate (signed by the shared CA)
    #   3. Writes static pod manifests for kube-apiserver, kube-controller-manager,
    #      and kube-scheduler — kubelet picks them up and starts the pods
    #   4. Announces itself to the existing etcd cluster on port 2380 (peer port)
    #      and waits until the new etcd member is healthy before continuing
    #   5. Registers the node with the cluster via kubelet
    #
    # The creates guard makes the task idempotent: if the join was interrupted and
    # left a partial state, run `kubeadm reset -f` on the node before retrying.

    - name: Join control plane
      command: >-
        {{ hostvars[groups['bootstrap_control_plane'][0]].join_command }}
        --control-plane
        --certificate-key {{ hostvars[groups['bootstrap_control_plane'][0]].certificate_key }}
        --node-name {{ inventory_hostname }}
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: Workers
  hosts: workers
  become: true
  tasks:

    # -----------------------------------------------------------------------------
    # JOIN WORKER NODES
    #
    # Workers run only the kubelet — no control plane components. The join process:
    #   1. kubelet authenticates with the API server using the bootstrap token
    #   2. The API server approves the kubelet's Certificate Signing Request (CSR)
    #      and issues it a client certificate
    #   3. kubelet switches to the issued certificate for all future communication
    #   4. The node appears in `kubectl get nodes` as NotReady until Flannel sets up
    #      the pod network on this node (typically within a few seconds)

    - name: Join worker
      command: >-
        {{ hostvars[groups['bootstrap_control_plane'][0]].join_command }}
        --node-name {{ inventory_hostname }}
      args:
        creates: /etc/kubernetes/kubelet.conf
